title = "Server Guardian public-release secret and private-data policy"

[extend]
useDefault = true

[[rules]]
id = "rfc1918-ipv4-address"
description = "RFC1918 IPv4 address"
regex = '''\b(?:10\.(?:(?:25[0-5]|2[0-4][0-9]|1[0-9]{2}|[1-9]?[0-9])\.){2}(?:25[0-5]|2[0-4][0-9]|1[0-9]{2}|[1-9]?[0-9])|172\.(?:1[6-9]|2[0-9]|3[0-1])\.(?:25[0-5]|2[0-4][0-9]|1[0-9]{2}|[1-9]?[0-9])\.(?:25[0-5]|2[0-4][0-9]|1[0-9]{2}|[1-9]?[0-9])|192\.168\.(?:25[0-5]|2[0-4][0-9]|1[0-9]{2}|[1-9]?[0-9])\.(?:25[0-5]|2[0-4][0-9]|1[0-9]{2}|[1-9]?[0-9]))\b'''
tags = ["privacy", "rfc1918"]

[[rules]]
id = "abuseipdb-api-key-assignment"
description = "ABUSEIPDB_API_KEY assignment"
regex = '''(?i)\bABUSEIPDB_API_KEY\b\s*[:=]\s*["']?([A-Za-z0-9_-]{16,})["']?'''
secretGroup = 1
tags = ["api", "abuseipdb"]

[[rules]]
id = "generic-private-key-header"
description = "Generic PEM or OpenSSH private-key header"
regex = '''(?m)^-----BEGIN (?:[A-Z0-9]+ )*PRIVATE KEY-----$'''
tags = ["key", "private-key"]

[allowlist]
description = "Documentation TEST-NET addresses and intentionally synthetic fixture files only"
regexes = [
  '''\b(?:192\.0\.2|198\.51\.100|203\.0\.113)\.(?:25[0-5]|2[0-4][0-9]|1[0-9]{2}|[1-9]?[0-9])\b''',
]
